<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RVFBGNSC · Board Games</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0d12;--bg2:#13131a;--bg3:#1a1a24;--bg4:#22222f;--bg5:#2c2c3e;
  --border:#252535;--border2:#303048;
  --text:#e8e8f2;--text2:#a0a0c0;--text3:#55556e;
  --accent:#7c6cf5;--accent2:#5b4fd4;
  --accent-dim:rgba(124,108,245,.13);--accent-border:rgba(124,108,245,.32);
  --green:#3ecf7e;--green-dim:rgba(62,207,126,.12);
  --orange:#f59b3e;--red:#e05c5c;
  --w-green:#3ecf7e;--w-orange:#f59b3e;--w-red:#e05c5c;
  --radius:10px;--radius-lg:14px;--radius-xl:18px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:3px}
a{color:var(--accent);text-decoration:none}

/* HEADER */
.header{position:relative;overflow:hidden;padding:32px 20px 28px;background:linear-gradient(180deg,#0d1020 0%,#0d0d12 100%)}
.header::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 60% at 20% 50%,rgba(62,100,207,.18) 0%,transparent 70%),
  radial-gradient(ellipse 50% 80% at 75% 30%,rgba(62,180,150,.13) 0%,transparent 65%),
  radial-gradient(ellipse 40% 50% at 50% 90%,rgba(124,108,245,.10) 0%,transparent 60%);
  animation:aurora 12s ease-in-out infinite alternate}
@keyframes aurora{0%{opacity:.7;transform:translateY(0)}50%{opacity:1;transform:translateY(-5px)}100%{opacity:.8;transform:translateY(3px)}}
.header-inner{position:relative;z-index:1;max-width:860px;margin:0 auto}
.header-title{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.logo{font-size:26px;filter:drop-shadow(0 0 8px rgba(124,108,245,.55))}
.header h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.header h1 span{background:linear-gradient(135deg,#a090ff,#5ee8c0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-sub{font-size:12px;color:var(--text3);margin-top:2px}
.header-badges{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.hbadge{font-size:11px;font-weight:500;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:var(--text2);padding:3px 10px;border-radius:20px}

/* MAIN */
.main{max-width:860px;margin:0 auto;padding:18px 14px 80px}

/* RANDOM BTN */
.random-btn{width:100%;padding:13px 20px;border-radius:var(--radius-lg);
  background:linear-gradient(135deg,rgba(124,108,245,.2),rgba(62,180,150,.15));
  border:1px solid rgba(124,108,245,.35);color:var(--text);font-size:14px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;
  transition:all .2s;font-family:'Inter',sans-serif;margin-bottom:14px}
.random-btn:hover{background:linear-gradient(135deg,rgba(124,108,245,.3),rgba(62,180,150,.22));transform:translateY(-1px)}
.random-btn:active{transform:translateY(0)}

/* CONTROLS */
.controls{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.search-wrap{flex:1;min-width:140px;position:relative}
.search-wrap input{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);
  padding:9px 12px 9px 36px;border-radius:var(--radius);font-size:13px;font-family:'Inter',sans-serif;
  outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--text3)}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}
.ctrl-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);
  padding:9px 13px;border-radius:var(--radius);cursor:pointer;font-size:12px;font-weight:500;
  font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.ctrl-btn:hover{border-color:var(--border2);color:var(--text);background:var(--bg3)}
.ctrl-btn.active{background:var(--accent-dim);border-color:var(--accent-border);color:var(--accent)}

/* PANELS */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;display:none}
.panel.open{display:block}
.panel-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px}
.panel-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px 16px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg>label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.fg input,.fg select{background:var(--bg3);border:1px solid var(--border);color:var(--text);
  padding:7px 10px;border-radius:var(--radius);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus{border-color:var(--accent)}
.rr{display:flex;align-items:center;gap:5px}
.rr input{flex:1;min-width:0}
.rr span{color:var(--text3);font-size:12px}
.owner-chips{display:flex;flex-wrap:wrap;gap:5px}
.oc{font-size:12px;font-weight:500;padding:4px 10px;border-radius:20px;cursor:pointer;
  background:var(--bg3);border:1px solid var(--border);color:var(--text2);transition:all .15s}
.oc:hover{border-color:var(--border2);color:var(--text)}
.oc.active{background:var(--accent-dim);border-color:var(--accent-border);color:var(--accent)}
.panel-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.result-info{font-size:11px;font-weight:500;color:var(--text3)}
.sort-opts{display:flex;flex-wrap:wrap;gap:6px}
.sort-opt{font-size:12px;font-weight:500;padding:5px 11px;border-radius:20px;
  background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px}
.sort-opt:hover{border-color:var(--border2);color:var(--text)}
.sort-opt.active{background:var(--accent-dim);border-color:var(--accent-border);color:var(--accent)}

/* GAME CARD with hexagon */
.game-list{display:flex;flex-direction:column;gap:8px}
.game-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:12px 14px;cursor:pointer;transition:all .15s;display:flex;gap:12px;align-items:center}
.game-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.game-card:active{transform:translateY(0)}

/* Hexagon rating */
.hex-wrap{flex-shrink:0;display:flex;align-items:center;justify-content:center;width:52px}
.hex{width:52px;height:58px;position:relative;display:flex;align-items:center;justify-content:center}
.hex svg{position:absolute;inset:0;width:100%;height:100%}
.hex-val{position:relative;z-index:1;font-size:13px;font-weight:700;color:#fff;line-height:1;text-align:center}
.hex-val small{display:block;font-size:9px;font-weight:500;opacity:.8;margin-top:1px}

.gc-content{flex:1;min-width:0}
.gc-row1{display:flex;align-items:baseline;gap:7px;margin-bottom:4px;flex-wrap:wrap}
.gc-rank{font-size:11px;font-weight:600;color:var(--text3);min-width:32px;flex-shrink:0}
.gc-rank.top{color:var(--accent)}
.gc-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;flex:1;min-width:80px}
.gc-year{font-size:11px;color:var(--text3);white-space:nowrap}
.gc-row2{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:4px;align-items:center}
.gc-meta{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:3px}
.gc-meta .lbl{color:var(--text3);font-size:10px}
.weight-g{color:var(--w-green)}
.weight-o{color:var(--w-orange)}
.weight-r{color:var(--w-red)}
.gc-row3{font-size:11px;color:var(--text3)}
.gc-row3 span{color:var(--text2)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}

/* Loading/Error */
.loading-wrap{text-align:center;padding:60px 20px}
.loading-spinner{width:30px;height:30px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--text3)}
.error-wrap{text-align:center;padding:40px 20px}
.error-wrap p{color:var(--red);font-size:13px;margin-bottom:8px}
.error-wrap small{color:var(--text3);font-size:12px}

/* DETAIL MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
.overlay.show{display:flex}
@media(min-width:600px){.overlay{align-items:center;padding:20px}}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-xl) var(--radius-xl) 0 0;
  width:100%;max-width:640px;max-height:92vh;overflow-y:auto;animation:slideUp .22s ease}
@media(min-width:600px){.modal{border-radius:var(--radius-xl)}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-drag{width:36px;height:4px;background:var(--bg5);border-radius:2px;margin:12px auto 0}
@media(min-width:600px){.modal-drag{display:none}}
.modal-header{padding:14px 16px 0;display:flex;gap:14px;position:relative}
.modal-close{position:absolute;top:0;right:16px;background:var(--bg4);border:1px solid var(--border);
  color:var(--text2);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;cursor:pointer;font-size:13px;transition:all .15s}
.modal-close:hover{background:var(--bg5);color:var(--text)}
.modal-thumb{width:100px;height:100px;border-radius:var(--radius-lg);object-fit:cover;border:1px solid var(--border);flex-shrink:0;background:var(--bg4)}
.modal-thumb-ph{width:100px;height:100px;border-radius:var(--radius-lg);border:1px solid var(--border);flex-shrink:0;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--text3)}
.modal-title-area{flex:1;min-width:0;padding-top:2px;padding-right:34px}
.modal-title{font-size:16px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:3px}
.modal-year-line{font-size:11px;color:var(--text3);margin-bottom:8px}
.modal-tags{display:flex;flex-wrap:wrap;gap:4px}
.mtag{font-size:11px;font-weight:500;background:var(--bg4);border:1px solid var(--border);color:var(--text2);padding:2px 8px;border-radius:20px}
.mtag.hi{background:var(--accent-dim);border-color:var(--accent-border);color:var(--accent)}
.modal-body{padding:14px 16px 24px}
.modal-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px}
.mstat{background:var(--bg3);border-radius:var(--radius);padding:10px 6px;text-align:center}
.mstat-val{font-size:15px;font-weight:700;color:var(--text)}
.mstat-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-top:2px}
.modal-desc{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:14px;max-height:160px;overflow-y:auto}
.section-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:6px}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.chip{font-size:12px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:3px 9px;border-radius:var(--radius)}
.bgg-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--accent);
  background:var(--accent-dim);border:1px solid var(--accent-border);padding:8px 14px;border-radius:var(--radius);
  text-decoration:none;transition:background .15s}
.bgg-btn:hover{background:rgba(124,108,245,.22)}
.modal-loading-inner{text-align:center;padding:50px 20px;color:var(--text3);font-size:13px}
.modal-img-full{width:100%;max-height:220px;object-fit:contain;border-radius:var(--radius);margin-bottom:14px;background:var(--bg3);border:1px solid var(--border)}

/* RANDOM MODAL */
.random-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:400;display:none;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(8px)}
.random-overlay.show{display:flex}
.random-modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-xl);
  width:100%;max-width:460px;max-height:92vh;overflow-y:auto;animation:slideUp .22s ease;padding:22px}
.random-modal h2{font-size:17px;font-weight:700;margin-bottom:3px;color:var(--text)}
.random-modal .sub{font-size:12px;color:var(--text3);margin-bottom:18px}
.rm-section{margin-bottom:18px}
.rm-section-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:8px}
.rm-owner-chips{display:flex;flex-wrap:wrap;gap:5px}
.roc{font-size:12px;font-weight:500;padding:6px 12px;border-radius:20px;cursor:pointer;
  background:var(--bg3);border:1px solid var(--border);color:var(--text2);transition:all .15s}
.roc:hover{border-color:var(--border2);color:var(--text)}
.roc.active{background:var(--green-dim);border-color:rgba(62,207,126,.4);color:var(--green)}
.rm-player-row{display:flex;align-items:center;gap:10px;margin-top:12px}
.pm-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--bg3);
  color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;font-family:'Inter',sans-serif;flex-shrink:0}
.pm-btn:hover{border-color:var(--border2);color:var(--text);background:var(--bg4)}
.pm-display{font-size:22px;font-weight:700;color:var(--text);min-width:36px;text-align:center}
.pm-label{font-size:12px;color:var(--text3);flex:1}
.rm-go-btn{width:100%;padding:13px;border-radius:var(--radius-lg);background:linear-gradient(135deg,var(--accent),#5b4fd4);
  border:none;color:white;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;
  transition:opacity .15s,transform .15s;margin-bottom:8px}
.rm-go-btn:hover{opacity:.9;transform:translateY(-1px)}
.rm-go-btn:active{transform:translateY(0)}
.rm-close-link{display:block;text-align:center;font-size:12px;color:var(--text3);cursor:pointer;padding:5px}
.rm-close-link:hover{color:var(--text2)}
.result-card{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:16px;margin-bottom:14px}
.result-card-img{width:100%;max-height:160px;object-fit:contain;border-radius:var(--radius);margin-bottom:12px;background:var(--bg4);display:block}
.result-card-name{font-size:17px;font-weight:700;color:var(--text);margin-bottom:3px}
.result-card-year{font-size:11px;color:var(--text3);margin-bottom:10px}
.result-card-stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.rc-stat{font-size:12px;color:var(--text2)}
.rc-stat strong{color:var(--text);font-weight:600}
.rm-actions{display:flex;gap:7px;margin-top:4px}
.rm-action-btn{flex:1;padding:10px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg4);
  color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.rm-action-btn:hover{background:var(--bg5);color:var(--text)}
.rm-action-btn.primary{background:var(--accent-dim);border-color:var(--accent-border);color:var(--accent)}
.rm-action-btn.primary:hover{background:rgba(124,108,245,.22)}
.rm-msg{text-align:center;font-size:13px;color:var(--text3);padding:8px 0}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-title">
      <span class="logo">👹</span>
      <h1><span>RVFBGNSC</span> Games</h1>
    </div>
    <div class="header-sub">Board game collection tracker</div>
    <div class="header-badges">
      <span class="hbadge" id="hb-count">Loading…</span>
    </div>
  </div>
</div>

<div class="main">
  <button class="random-btn" onclick="openRandom()">🎲 What should we play tonight?</button>

  <div class="controls">
    <div class="search-wrap">
      <span class="si">⌕</span>
      <input type="text" id="search" placeholder="Search games…" oninput="applyFilters()">
    </div>
    <button class="ctrl-btn" id="sort-btn" onclick="togglePanel('sort')">↕ Sort</button>
    <button class="ctrl-btn" id="filter-btn" onclick="togglePanel('filter')">⚙ Filter</button>
    <button class="ctrl-btn" onclick="clearAll()">✕</button>
  </div>

  <div class="panel" id="sort-panel">
    <div class="panel-label">Sort by</div>
    <div class="sort-opts">
      <span class="sort-opt active" data-col="BGG Rank" data-asc="true" onclick="setSortOpt(this)">BGG Rank ↑</span>
      <span class="sort-opt" data-col="BGG Rating" data-asc="false" onclick="setSortOpt(this)">Rating ↓</span>
      <span class="sort-opt" data-col="Game" data-asc="true" onclick="setSortOpt(this)">Name A–Z</span>
      <span class="sort-opt" data-col="Game" data-asc="false" onclick="setSortOpt(this)">Name Z–A</span>
      <span class="sort-opt" data-col="Year" data-asc="false" onclick="setSortOpt(this)">Newest</span>
      <span class="sort-opt" data-col="Year" data-asc="true" onclick="setSortOpt(this)">Oldest</span>
      <span class="sort-opt" data-col="Playtime" data-asc="true" onclick="setSortOpt(this)">Playtime ↑</span>
      <span class="sort-opt" data-col="Playtime" data-asc="false" onclick="setSortOpt(this)">Playtime ↓</span>
      <span class="sort-opt" data-col="Weight" data-asc="true" onclick="setSortOpt(this)">Weight ↑</span>
      <span class="sort-opt" data-col="Weight" data-asc="false" onclick="setSortOpt(this)">Weight ↓</span>
      <span class="sort-opt" data-col="Min" data-asc="true" onclick="setSortOpt(this)">Min players ↑</span>
      <span class="sort-opt" data-col="Max" data-asc="false" onclick="setSortOpt(this)">Max players ↓</span>
    </div>
  </div>

  <div class="panel" id="filter-panel">
    <div class="panel-label">Filter by</div>
    <div class="panel-grid">
      <div class="fg" style="grid-column:1/-1">
        <label>Owner (any match)</label>
        <div class="owner-chips" id="owner-chips"></div>
      </div>
      <div class="fg">
        <label>Playtime (min)</label>
        <div class="rr">
          <input type="number" id="f-play-min" placeholder="0" min="0" oninput="applyFilters()">
          <span>–</span>
          <input type="number" id="f-play-max" placeholder="∞" min="0" oninput="applyFilters()">
        </div>
      </div>
      <div class="fg">
        <label>Weight (1–5)</label>
        <div class="rr">
          <input type="number" id="f-w-min" placeholder="1.0" min="1" max="5" step="0.1" oninput="applyFilters()">
          <span>–</span>
          <input type="number" id="f-w-max" placeholder="5.0" min="1" max="5" step="0.1" oninput="applyFilters()">
        </div>
      </div>
      <div class="fg">
        <label>Players</label>
        <div class="rr">
          <input type="number" id="f-p-min" placeholder="1" min="1" oninput="applyFilters()">
          <span>–</span>
          <input type="number" id="f-p-max" placeholder="∞" min="1" oninput="applyFilters()">
        </div>
      </div>
    </div>
    <div class="panel-footer">
      <span class="result-info" id="result-info"></span>
    </div>
  </div>

  <div id="game-list-wrap">
    <div class="loading-wrap"><div class="loading-spinner"></div><div class="loading-text">Loading your collection…</div></div>
  </div>
</div>

<!-- Detail Modal -->
<div class="overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="modal" id="detail-modal">
    <div class="modal-drag"></div>
    <div id="detail-inner"><div class="modal-loading-inner">Loading…</div></div>
  </div>
</div>

<!-- Random Modal -->
<div class="random-overlay" id="random-overlay">
  <div class="random-modal"><div id="random-inner"></div></div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const SHEET_ID='2PACX-1vR7eM-cNDkga-lVJPBBzhqcyXoFiz2d5goit8T_2-SU-fIOpJSIxx-TW4bh0ZNZcRu06fjOQUdSj1nA';
const CSV_URL=`https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?output=csv`;

// ─── STATE ────────────────────────────────────────────────────────────────────
let allGames=[],filtered=[],sortCol='BGG Rank',sortAsc=true,selectedOwners=new Set(),activePanel=null;

// Random session state
let randomSelectedOwners=new Set(); // chip-selected owners
let randomExtraPlayers=0;            // PLUS/MINUS offset beyond chip count
let sessionUsedIds=new Set();        // IDs used in this random session

// ─── HELPERS ─────────────────────────────────────────────────────────────────
// Split owners by comma OR dot (both used in the sheet), trim whitespace
function splitOwners(str){ return (str||'').split(/[,.]/).map(s=>s.trim()).filter(Boolean); }
function n(v){ const x=parseFloat((v||'').toString().replace(',','.')); return isNaN(x)?null:x; }

// Hexagon rating color
function hexColor(r){
  if(r===null||r===undefined) return '#3a3a4a';
  if(r<3)  return '#7a1a1a';
  if(r<5)  return '#c0392b';
  if(r<7)  return '#2c3e7a';
  if(r<8)  return '#2980b9';
  if(r<9)  return '#27ae60';
  if(r<=10)return '#1a6b3a';
  return '#3a3a4a';
}

// Weight color class
function weightClass(v){
  const w=n(v);
  if(w===null||w<3) return 'weight-g';
  if(w<4) return 'weight-o';
  return 'weight-r';
}

// Build hexagon SVG
function hexSVG(rating){
  const r=n(rating);
  const col=hexColor(r);
  const val=r!==null?r.toFixed(1):'N/A';
  // pointy-top hexagon path for 52×58
  const pts='26,2 50,16 50,42 26,56 2,42 2,16';
  return `<div class="hex-wrap"><div class="hex">
    <svg viewBox="0 0 52 58" xmlns="http://www.w3.org/2000/svg">
      <polygon points="${pts}" fill="${col}" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    </svg>
    <div class="hex-val">${val}<small>BGG</small></div>
  </div></div>`;
}

// ─── LOAD ─────────────────────────────────────────────────────────────────────
async function loadGames(){
  try{
    const res=await fetch(CSV_URL);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const text=await res.text();
    allGames=parseCSV(text);
    const ownerSet=new Set();
    allGames.forEach(g=>splitOwners(g['Owned by']).forEach(o=>ownerSet.add(o)));
    document.getElementById('hb-count').textContent=allGames.length+' games';
    document.getElementById('hb-owners').textContent=[...ownerSet].sort().join(', ');
    initFilterOwnerChips([...ownerSet].sort());
    document.getElementById('result-info').textContent=allGames.length+' of '+allGames.length+' games';
    applyFilters();
  }catch(e){
    document.getElementById('game-list-wrap').innerHTML=
      `<div class="error-wrap"><p>⚠ Could not load game data</p><small>${e.message}</small></div>`;
  }
}

function parseCSV(text){
  const lines=text.trim().split('\n');
  let hi=0;
  for(let i=0;i<Math.min(8,lines.length);i++){
    if(lines[i].includes('ID')&&lines[i].includes('Game')){hi=i;break;}
  }
  const headers=parseRow(lines[hi]);
  const out=[];
  for(let i=hi+1;i<lines.length;i++){
    const vals=parseRow(lines[i]);
    const obj={};
    headers.forEach((h,idx)=>obj[h.trim()]=(vals[idx]||'').trim());
    // normalise decimal separator
    ['BGG Rating','Weight'].forEach(k=>{if(obj[k]) obj[k]=obj[k].replace(',','.');});
    if(obj['ID']&&obj['Game']) out.push(obj);
  }
  return out;
}

function parseRow(line){
  const res=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){res.push(cur);cur='';}
    else cur+=c;
  }
  res.push(cur);
  return res;
}

// ─── FILTER OWNER CHIPS ───────────────────────────────────────────────────────
function initFilterOwnerChips(owners){
  const wrap=document.getElementById('owner-chips');
  wrap.innerHTML='';
  owners.forEach(o=>{
    const chip=document.createElement('span');
    chip.className='oc';chip.textContent=o;
    chip.onclick=()=>{
      selectedOwners.has(o)?(selectedOwners.delete(o),chip.classList.remove('active'))
                           :(selectedOwners.add(o),chip.classList.add('active'));
      applyFilters();
    };
    wrap.appendChild(chip);
  });
}

// ─── FILTERS / SORT ───────────────────────────────────────────────────────────
function applyFilters(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const pMin=n(document.getElementById('f-play-min').value);
  const pMax=n(document.getElementById('f-play-max').value);
  const wMin=n(document.getElementById('f-w-min').value);
  const wMax=n(document.getElementById('f-w-max').value);
  const plMin=n(document.getElementById('f-p-min').value);
  const plMax=n(document.getElementById('f-p-max').value);
  filtered=allGames.filter(g=>{
    if(q&&!g['Game'].toLowerCase().includes(q)) return false;
    if(selectedOwners.size>0){
      const ow=splitOwners(g['Owned by']);
      if(!ow.some(o=>selectedOwners.has(o))) return false;
    }
    const play=n(g['Playtime']);
    if(pMin!==null&&play!==null&&play<pMin) return false;
    if(pMax!==null&&play!==null&&play>pMax) return false;
    const w=n(g['Weight']);
    if(wMin!==null&&w!==null&&w<wMin) return false;
    if(wMax!==null&&w!==null&&w>wMax) return false;
    const mn=n(g['Min']),mx=n(g['Max']);
    if(plMin!==null&&mx!==null&&mx<plMin) return false;
    if(plMax!==null&&mn!==null&&mn>plMax) return false;
    return true;
  });
  document.getElementById('result-info').textContent=filtered.length+' of '+allGames.length+' games';
  renderList();
}

function setSortOpt(el){
  document.querySelectorAll('.sort-opt').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  sortCol=el.dataset.col; sortAsc=el.dataset.asc==='true';
  renderList();
}

function togglePanel(name){
  const panel=document.getElementById(name+'-panel');
  const btn=document.getElementById(name+'-btn');
  if(activePanel===name){panel.classList.remove('open');btn.classList.remove('active');activePanel=null;}
  else{
    ['sort','filter'].forEach(p=>{document.getElementById(p+'-panel').classList.remove('open');document.getElementById(p+'-btn').classList.remove('active');});
    panel.classList.add('open');btn.classList.add('active');activePanel=name;
  }
}

function clearAll(){
  document.getElementById('search').value='';
  ['f-play-min','f-play-max','f-w-min','f-w-max','f-p-min','f-p-max'].forEach(id=>document.getElementById(id).value='');
  selectedOwners.clear();
  document.querySelectorAll('.oc').forEach(c=>c.classList.remove('active'));
  applyFilters();
}

// ─── RENDER LIST ──────────────────────────────────────────────────────────────
function renderList(){
  const sorted=[...filtered].sort((a,b)=>{
    if(sortCol==='BGG Rank'){
      const an=parseInt(a[sortCol])||999999,bn=parseInt(b[sortCol])||999999;
      return sortAsc?an-bn:bn-an;
    }
    const av=a[sortCol]||'',bv=b[sortCol]||'';
    const an=n(av),bn=n(bv);
    if(an!==null&&bn!==null) return sortAsc?an-bn:bn-an;
    return sortAsc?String(av).localeCompare(String(bv)):String(bv).localeCompare(String(av));
  });
  const wrap=document.getElementById('game-list-wrap');
  if(!sorted.length){wrap.innerHTML='<div class="empty-state">No games match your filters 🎯</div>';return;}
  wrap.innerHTML='<div class="game-list" id="game-list"></div>';
  const list=document.getElementById('game-list');
  sorted.forEach(g=>{
    const rankRaw=parseInt(g['BGG Rank'])||999999;
    const rankDisplay=rankRaw>=999999?'—':'#'+rankRaw.toLocaleString();
    const isTop=rankRaw<=100;
    const w=n(g['Weight']);
    const wClass=weightClass(g['Weight']);
    const wDisplay=w?w.toFixed(2):'—';
    const play=g['Playtime']?g['Playtime']+' min':'—';
    const players=(g['Min']&&g['Max'])?`${g['Min']}–${g['Max']}`:(g['Min']||g['Max']||'—');
    const card=document.createElement('div');
    card.className='game-card';
    card.innerHTML=`
      ${hexSVG(g['BGG Rating'])}
      <div class="gc-content">
        <div class="gc-row1">
          <span class="gc-rank ${isTop?'top':''}">${rankDisplay}</span>
          <span class="gc-name">${g['Game']}</span>
          <span class="gc-year">(${g['Year']||'?'})</span>
        </div>
        <div class="gc-row2">
          <span class="gc-meta"><span class="lbl">⏱</span> ${play}</span>
          <span class="gc-meta"><span class="lbl">👥</span> ${players}</span>
          <span class="gc-meta"><span class="lbl">⚙</span> <span class="${wClass}">${wDisplay}</span></span>
        </div>
        <div class="gc-row3">In collection: <span>${g['Owned by']||'—'}</span></div>
      </div>`;
    card.onclick=()=>openDetail(g);
    list.appendChild(card);
  });
}

// ─── DETAIL MODAL ─────────────────────────────────────────────────────────────
function openDetail(g){
  document.getElementById('detail-overlay').classList.add('show');
  document.getElementById('detail-inner').innerHTML='<div class="modal-loading-inner">Loading from BoardGameGeek…</div>';
  fetchBGGDetail(g['ID'],g);
}

async function fetchBGGDetail(id,g){
  try{
    const res=await fetch(`https://boardgamegeek.com/xmlapi2/thing?id=${id}&stats=1`);
    if(!res.ok) throw 0;
    const xml=new DOMParser().parseFromString(await res.text(),'text/xml');
    const item=xml.querySelector('item');
    if(!item) throw 0;
    const get=(sel,attr='value')=>{const el=item.querySelector(sel);return el?(attr?el.getAttribute(attr):el.textContent):null;};
    const getAll=(sel,attr='value')=>[...item.querySelectorAll(sel)].map(el=>attr?el.getAttribute(attr):el.textContent);
    const name=get('name[type="primary"]')||g['Game'];
    const year=get('yearpublished')||g['Year'];
    const image=get('image',null);
    const thumb=get('thumbnail',null);
    const desc=get('description',null);
    const minp=get('minplayers')||g['Min'];
    const maxp=get('maxplayers')||g['Max'];
    const time=get('playingtime')||g['Playtime'];
    const minage=get('minage');
    const avgR=parseFloat(get('statistics > ratings > average')||0);
    const rankEl=item.querySelector('rank[name="boardgame"]');
    const bggRank=rankEl?rankEl.getAttribute('value'):null;
    const avgW=parseFloat(get('statistics > ratings > averageweight')||0);
    const cats=getAll('link[type="boardgamecategory"]').slice(0,6);
    const mechs=getAll('link[type="boardgamemechanic"]').slice(0,6);
    const designers=getAll('link[type="boardgamedesigner"]').filter(d=>d!=='(Uncredited)').slice(0,3);
    const rankDisplay=(bggRank&&bggRank!=='Not Ranked')?'#'+parseInt(bggRank).toLocaleString():null;
    const descClean=desc?decodeHTML(desc).replace(/<[^>]+>/g,''):'';
    const wClass=weightClass(avgW.toFixed(2));
    const imgSrc=image||thumb;

    document.getElementById('detail-inner').innerHTML=`
      <div class="modal-drag"></div>
      <div class="modal-header">
        ${imgSrc?`<img class="modal-thumb" src="${imgSrc}" onerror="this.outerHTML='<div class=modal-thumb-ph>🎲</div>'">`:'<div class="modal-thumb-ph">🎲</div>'}
        <div class="modal-title-area">
          <div class="modal-title">${name}</div>
          <div class="modal-year-line">${year}${designers.length?' · '+designers.join(', '):''}</div>
          <div class="modal-tags">
            ${avgR?`<span class="mtag hi">⭐ ${avgR.toFixed(2)}</span>`:''}
            ${rankDisplay?`<span class="mtag">${rankDisplay}</span>`:''}
            ${avgW?`<span class="mtag ${wClass}">⚙ ${avgW.toFixed(2)}</span>`:''}
          </div>
        </div>
        <button class="modal-close" onclick="closeDetailBtn()">✕</button>
      </div>
      <div class="modal-body">
        ${imgSrc?`<img class="modal-img-full" src="${imgSrc}" alt="${name}" onerror="this.style.display='none'">`:'' }
        <div class="modal-stats">
          <div class="mstat"><div class="mstat-val">${minp}–${maxp}</div><div class="mstat-lbl">Players</div></div>
          <div class="mstat"><div class="mstat-val">${time}m</div><div class="mstat-lbl">Playtime</div></div>
          <div class="mstat"><div class="mstat-val">${minage?minage+'+':'—'}</div><div class="mstat-lbl">Age</div></div>
          <div class="mstat"><div class="mstat-val" style="font-size:10px;line-height:1.3;padding-top:4px">${g['Owned by']}</div><div class="mstat-lbl">Owner</div></div>
        </div>
        ${g['Best with']?`<div class="section-lbl">Best with</div><div class="chips"><span class="chip">${g['Best with']}</span></div>`:''}
        ${descClean?`<div class="section-lbl">About</div><p class="modal-desc">${descClean}</p>`:''}
        ${cats.length?`<div class="section-lbl">Categories</div><div class="chips">${cats.map(c=>`<span class="chip">${c}</span>`).join('')}</div>`:''}
        ${mechs.length?`<div class="section-lbl">Mechanics</div><div class="chips">${mechs.map(m=>`<span class="chip">${m}</span>`).join('')}</div>`:''}
        <a class="bgg-btn" href="https://boardgamegeek.com/boardgame/${id}" target="_blank">Open on BoardGameGeek ↗</a>
      </div>`;
  }catch(e){
    document.getElementById('detail-inner').innerHTML=`
      <div class="modal-drag"></div>
      <div class="modal-header">
        <div class="modal-thumb-ph">🎲</div>
        <div class="modal-title-area">
          <div class="modal-title">${g['Game']}</div>
          <div class="modal-year-line">${g['Year']||''}</div>
          <div class="modal-tags">${g['BGG Rating']?`<span class="mtag hi">⭐ ${g['BGG Rating']}</span>`:''}</div>
        </div>
        <button class="modal-close" onclick="closeDetailBtn()">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-stats">
          <div class="mstat"><div class="mstat-val">${g['Min']}–${g['Max']}</div><div class="mstat-lbl">Players</div></div>
          <div class="mstat"><div class="mstat-val">${g['Playtime']}m</div><div class="mstat-lbl">Playtime</div></div>
          <div class="mstat"><div class="mstat-val">${parseFloat(g['Weight']||0).toFixed(1)}</div><div class="mstat-lbl">Weight</div></div>
          <div class="mstat"><div class="mstat-val" style="font-size:10px;line-height:1.3;padding-top:4px">${g['Owned by']}</div><div class="mstat-lbl">Owner</div></div>
        </div>
        <a class="bgg-btn" href="https://boardgamegeek.com/boardgame/${g['ID']}" target="_blank">Open on BoardGameGeek ↗</a>
      </div>`;
  }
}

function decodeHTML(s){const t=document.createElement('textarea');t.innerHTML=s;return t.value;}
function closeDetail(e){if(e.target===document.getElementById('detail-overlay')) closeDetailBtn();}
function closeDetailBtn(){document.getElementById('detail-overlay').classList.remove('show');}

// ─── RANDOM GAME ──────────────────────────────────────────────────────────────
function getOwnerList(){
  const s=new Set();
  allGames.forEach(g=>splitOwners(g['Owned by']).forEach(o=>s.add(o)));
  return [...s].sort();
}

// Total effective player count: chip selections + extra offset
function effectivePlayerCount(){
  return Math.max(0, randomSelectedOwners.size + randomExtraPlayers);
}

function openRandom(){
  // reset session
  sessionUsedIds=new Set();
  randomSelectedOwners=new Set();
  randomExtraPlayers=0;
  renderRandomStep1();
  document.getElementById('random-overlay').classList.add('show');
}

function closeRandomModal(){
  document.getElementById('random-overlay').classList.remove('show');
  sessionUsedIds=new Set(); // clear session when closing
}

function renderRandomStep1(){
  document.getElementById('random-inner').innerHTML=`
    <h2>🎲 Tonight's game</h2>
    <p class="sub">Who's playing? Select players and/or adjust the count.</p>
    <div class="rm-section">
      <div class="rm-section-title">Players (tap to select)</div>
      <div class="rm-owner-chips" id="random-owners-wrap"></div>
      <div class="rm-player-row">
        <button class="pm-btn" onclick="changeCount(-1)">−</button>
        <div class="pm-display" id="pm-display">0</div>
        <div class="pm-label">players selected</div>
        <button class="pm-btn" onclick="changeCount(1)">+</button>
      </div>
    </div>
    <button class="rm-go-btn" onclick="pickRandom()">🎯 Pick a random game!</button>
    <span class="rm-close-link" onclick="closeRandomModal()">Cancel</span>`;
  // build chips
  const wrap=document.getElementById('random-owners-wrap');
  getOwnerList().forEach(o=>{
    const chip=document.createElement('span');
    chip.className='roc'+(randomSelectedOwners.has(o)?' active':'');
    chip.textContent=o;
    chip.onclick=()=>{
      if(randomSelectedOwners.has(o)){
        randomSelectedOwners.delete(o);chip.classList.remove('active');
        // reduce effective count but don't go below 0 total
        // the display just reflects effectivePlayerCount
      } else {
        randomSelectedOwners.add(o);chip.classList.add('active');
      }
      refreshCountDisplay();
    };
    wrap.appendChild(chip);
  });
  refreshCountDisplay();
}

function refreshCountDisplay(){
  const el=document.getElementById('pm-display');
  if(el) el.textContent=effectivePlayerCount();
}

function changeCount(delta){
  // PLUS/MINUS adjusts extra offset; chip selections are never touched
  randomExtraPlayers=Math.max(-randomSelectedOwners.size,randomExtraPlayers+delta);
  // ensure total never goes below 0
  if(effectivePlayerCount()<0) randomExtraPlayers=-randomSelectedOwners.size;
  refreshCountDisplay();
}

function pickRandom(){
  const totalPlayers=effectivePlayerCount();
  let pool=allGames.filter(g=>{
    // exclude all games already shown this session
    if(sessionUsedIds.has(g['ID'])) return false;
    // max players check
    const mx=parseInt(g['Max'])||999;
    if(totalPlayers>0&&totalPlayers>mx) return false;
    // owner filter
    if(randomSelectedOwners.size>0){
      const ow=splitOwners(g['Owned by']);
      if(!ow.some(o=>randomSelectedOwners.has(o))) return false;
    }
    return true;
  });

  if(!pool.length){
    document.getElementById('random-inner').innerHTML=`
      <h2>😔 No more games!</h2>
      <p class="sub">All eligible games have already been shown in this session, or no game fits the current conditions.</p>
      <button class="rm-go-btn" onclick="resetRandomSession()">🔄 Start fresh</button>
      <span class="rm-close-link" onclick="closeRandomModal()">Close</span>`;
    return;
  }

  // Weighted random by BGG rank (rank 1 = 10x weight of rank maxRank)
  const maxR=Math.max(...pool.map(g=>{const r=parseInt(g['BGG Rank'])||0;return r>=999999?0:r;}));
  pool.forEach(g=>{
    const r=parseInt(g['BGG Rank'])||999999;
    g._w= r>=999999 ? 0.5 : (maxR===0 ? 1 : (maxR-r+1)/maxR*9+1);
  });
  const totalW=pool.reduce((s,g)=>s+g._w,0);
  let rand=Math.random()*totalW, chosen=pool[pool.length-1];
  for(const g of pool){rand-=g._w;if(rand<=0){chosen=g;break;}}

  sessionUsedIds.add(chosen['ID']);
  showRandomResult(chosen,totalPlayers);
}

function resetRandomSession(){
  sessionUsedIds=new Set();
  renderRandomStep1();
}

async function showRandomResult(g,totalPlayers){
  const rankRaw=parseInt(g['BGG Rank'])||999999;
  const rankDisplay=rankRaw>=999999?'Unranked':'#'+rankRaw.toLocaleString();
  document.getElementById('random-inner').innerHTML=`
    <h2>🎯 Tonight you play…</h2>
    <p class="sub">${totalPlayers>0?`For ${totalPlayers} player${totalPlayers>1?'s':''}`:''} · ${sessionUsedIds.size} game${sessionUsedIds.size!==1?'s':''} shown this session</p>
    <div class="result-card" id="res-card">
      <div id="res-img-slot"></div>
      <div class="result-card-name">${g['Game']}</div>
      <div class="result-card-year">${g['Year']||''} · ${rankDisplay}</div>
      <div class="result-card-stats">
        <div class="rc-stat">⏱ <strong>${g['Playtime']||'?'} min</strong></div>
        <div class="rc-stat">👥 <strong>${g['Min']}–${g['Max']}</strong></div>
        <div class="rc-stat">⚙ <strong class="${weightClass(g['Weight'])}">${parseFloat(g['Weight']||0).toFixed(2)}</strong></div>
        <div class="rc-stat">⭐ <strong>${g['BGG Rating']||'—'}</strong></div>
      </div>
      <div class="rc-stat">In collection: <strong>${g['Owned by']||'—'}</strong></div>
    </div>
    <div class="rm-actions">
      <button class="rm-action-btn" onclick="renderRandomStep1()">← Back</button>
      <button class="rm-action-btn primary" onclick="pickRandom()">🔀 Reshuffle</button>
    </div>
    <div style="margin-top:10px;text-align:center">
      <a class="bgg-btn" href="https://boardgamegeek.com/boardgame/${g['ID']}" target="_blank">View on BGG ↗</a>
    </div>`;

  // Try fetching thumbnail asynchronously
  try{
    const res=await fetch(`https://boardgamegeek.com/xmlapi2/thing?id=${g['ID']}`);
    const xml=new DOMParser().parseFromString(await res.text(),'text/xml');
    const thumb=xml.querySelector('thumbnail');
    const slot=document.getElementById('res-img-slot');
    if(thumb&&thumb.textContent&&slot){
      const img=document.createElement('img');
      img.className='result-card-img';
      img.src=thumb.textContent.trim();
      img.onerror=()=>img.remove();
      slot.appendChild(img);
    }
  }catch(e){}
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeDetailBtn();closeRandomModal();}});
loadGames();
</script>
