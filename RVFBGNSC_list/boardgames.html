<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Board Game Collection</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #111115;
  --bg2: #1a1a20;
  --bg3: #22222a;
  --bg4: #2a2a34;
  --bg5: #32323e;
  --border: #2c2c38;
  --border2: #3c3c4c;
  --text: #ededf5;
  --text2: #9898b8;
  --text3: #55556a;
  --accent: #8b7cf8;
  --accent-dim: rgba(139,124,248,0.15);
  --accent-border: rgba(139,124,248,0.35);
  --green: #4cc88a;
  --amber: #f5a623;
  --red: #e05c5c;
  --radius: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--bg5); border-radius: 3px; }

.app { max-width: 1400px; margin: 0 auto; padding: 36px 28px 60px; }

.header { margin-bottom: 32px; }
.header-top { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; }
.header h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; }
.header h1 em { font-style: normal; color: var(--accent); }
.game-count { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); background: var(--bg3); border: 1px solid var(--border); padding: 3px 10px; border-radius: 20px; }
.header-sub { font-size: 13px; color: var(--text3); }

.controls { display: flex; gap: 10px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
.search-wrap { flex: 1; min-width: 200px; position: relative; }
.search-wrap input { width: 100%; background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 9px 14px 9px 36px; border-radius: var(--radius); font-size: 13px; font-family: 'Syne', sans-serif; outline: none; transition: border-color 0.15s; }
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--text3); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 15px; pointer-events: none; }
.btn { background: var(--bg2); border: 1px solid var(--border); color: var(--text2); padding: 8px 14px; border-radius: var(--radius); cursor: pointer; font-size: 12px; font-family: 'Syne', sans-serif; transition: all 0.15s; white-space: nowrap; }
.btn:hover { border-color: var(--border2); color: var(--text); background: var(--bg3); }
.btn.active { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }

.filters { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; margin-bottom: 16px; display: none; }
.filters.open { display: block; }
.filters-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px 24px; }
.filter-group { display: flex; flex-direction: column; gap: 7px; }
.filter-group label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }
.filter-group select { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; border-radius: var(--radius); font-size: 13px; font-family: 'Syne', sans-serif; outline: none; transition: border-color 0.15s; cursor: pointer; }
.filter-group select:focus { border-color: var(--accent); }
.range-row { display: flex; align-items: center; gap: 6px; }
.range-row input { flex: 1; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 7px 8px; border-radius: var(--radius); font-size: 13px; font-family: 'DM Mono', monospace; outline: none; transition: border-color 0.15s; min-width: 0; }
.range-row input:focus { border-color: var(--accent); }
.range-sep { color: var(--text3); font-size: 12px; flex-shrink: 0; font-family: 'DM Mono', monospace; }
.owner-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.owner-chip { font-size: 11px; padding: 4px 10px; border-radius: 20px; cursor: pointer; background: var(--bg3); border: 1px solid var(--border); color: var(--text2); transition: all 0.15s; font-family: 'Syne', sans-serif; }
.owner-chip:hover { border-color: var(--border2); color: var(--text); }
.owner-chip.active { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }
.filters-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
.result-info { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); }

.table-wrap { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead tr { background: var(--bg2); border-bottom: 1px solid var(--border2); }
th { padding: 10px 12px; text-align: left; font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.9px; color: var(--text3); white-space: nowrap; cursor: pointer; user-select: none; transition: color 0.15s; }
th:hover { color: var(--text2); }
th.sorted { color: var(--accent); }
tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--bg3); }
tbody tr:hover .game-name { color: var(--accent); }
td { padding: 10px 12px; font-size: 13px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
td.game-name { color: var(--text); font-weight: 500; max-width: 260px; transition: color 0.1s; }
td.mono { font-family: 'DM Mono', monospace; font-size: 12px; }
.rating-cell { display: flex; align-items: center; gap: 7px; }
.rating-val { font-family: 'DM Mono', monospace; font-size: 12px; min-width: 32px; }
.rbar { width: 52px; height: 3px; background: var(--bg5); border-radius: 2px; flex-shrink: 0; }
.rbar-fill { height: 100%; border-radius: 2px; }
.badge-owner { display: inline-block; font-size: 10px; font-family: 'DM Mono', monospace; background: var(--bg4); border: 1px solid var(--border); color: var(--text3); padding: 2px 7px; border-radius: 20px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; vertical-align: middle; }
.empty { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; }

.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.82); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
.overlay.show { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius-xl); width: 100%; max-width: 700px; max-height: 90vh; overflow-y: auto; position: relative; animation: slideUp 0.2s ease; }
@keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-close-btn { position: sticky; top: 16px; float: right; margin: 16px 16px 0 0; background: var(--bg4); border: 1px solid var(--border); color: var(--text2); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 15px; z-index: 10; transition: all 0.15s; flex-shrink: 0; }
.modal-close-btn:hover { background: var(--bg5); color: var(--text); }
.modal-hero { display: flex; gap: 20px; padding: 24px 24px 0; }
.modal-img { width: 110px; height: 110px; border-radius: var(--radius-lg); object-fit: cover; background: var(--bg4); border: 1px solid var(--border); flex-shrink: 0; }
.modal-img-ph { width: 110px; height: 110px; border-radius: var(--radius-lg); background: var(--bg4); border: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 32px; color: var(--text3); }
.modal-title-area { flex: 1; min-width: 0; }
.modal-title { font-size: 20px; font-weight: 600; color: var(--text); line-height: 1.3; margin-bottom: 4px; }
.modal-year { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); margin-bottom: 12px; }
.modal-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.mtag { font-size: 11px; font-family: 'DM Mono', monospace; background: var(--bg4); border: 1px solid var(--border); color: var(--text2); padding: 3px 9px; border-radius: 20px; }
.mtag.hi { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }
.bgg-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--accent); background: var(--accent-dim); border: 1px solid var(--accent-border); padding: 5px 12px; border-radius: 20px; text-decoration: none; font-family: 'Syne', sans-serif; transition: background 0.15s; }
.bgg-btn:hover { background: rgba(139,124,248,0.25); text-decoration: none; }
.modal-body { padding: 20px 24px 28px; }
.modal-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
.mstat { background: var(--bg3); border-radius: var(--radius); padding: 13px 10px; text-align: center; }
.mstat-val { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; color: var(--text); }
.mstat-lbl { font-family: 'DM Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); margin-top: 4px; }
.modal-desc { font-size: 13px; color: var(--text2); line-height: 1.75; margin-bottom: 20px; }
.section-lbl { font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-bottom: 8px; }
.chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 18px; }
.chip { font-size: 12px; background: var(--bg3); border: 1px solid var(--border); color: var(--text2); padding: 4px 10px; border-radius: var(--radius); }
.modal-loading { text-align: center; padding: 50px 20px; color: var(--text3); font-size: 13px; font-family: 'DM Mono', monospace; }
.modal-err { text-align: center; padding: 10px 0 0; color: var(--text3); font-size: 12px; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-top">
      <h1>🎲 <em>RVFBGNSC</em> Games</h1>
      <span class="game-count" id="game-count">— games</span>
    </div>
    <div class="header-sub">Board game collection — click any game for full BGG details</div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="Search games…" oninput="applyFilters()">
    </div>
    <button class="btn" id="filter-btn" onclick="toggleFilters()">⚙ Filters</button>
    <button class="btn" onclick="clearFilters()">✕ Clear</button>
  </div>

  <div class="filters" id="filters-panel">
    <div class="filters-grid">
      <div class="filter-group" style="grid-column: 1 / -1;">
        <label>Owner</label>
        <div class="owner-chips" id="owner-chips"></div>
      </div>
      <div class="filter-group">
        <label>Playtime (min)</label>
        <div class="range-row">
          <input type="number" id="f-play-min" placeholder="0" min="0" oninput="applyFilters()">
          <span class="range-sep">—</span>
          <input type="number" id="f-play-max" placeholder="∞" min="0" oninput="applyFilters()">
        </div>
      </div>
      <div class="filter-group">
        <label>Weight (1–5)</label>
        <div class="range-row">
          <input type="number" id="f-w-min" placeholder="1.0" min="1" max="5" step="0.1" oninput="applyFilters()">
          <span class="range-sep">—</span>
          <input type="number" id="f-w-max" placeholder="5.0" min="1" max="5" step="0.1" oninput="applyFilters()">
        </div>
      </div>
      <div class="filter-group">
        <label>Players (range fits)</label>
        <div class="range-row">
          <input type="number" id="f-p-min" placeholder="1" min="1" oninput="applyFilters()">
          <span class="range-sep">—</span>
          <input type="number" id="f-p-max" placeholder="∞" min="1" oninput="applyFilters()">
        </div>
      </div>
    </div>
    <div class="filters-footer">
      <span class="result-info" id="result-info"></span>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-scroll">
      <table id="gtable">
        <thead>
          <tr>
            <th onclick="sortBy('Game')" data-col="Game">Game <span class="arr">↕</span></th>
            <th onclick="sortBy('Year')" data-col="Year">Year <span class="arr">↕</span></th>
            <th onclick="sortBy('Owned by')" data-col="Owned by">Owner <span class="arr">↕</span></th>
            <th onclick="sortBy('BGG Rating')" data-col="BGG Rating">BGG Rating <span class="arr">↑</span></th>
            <th onclick="sortBy('BGG Rank')" data-col="BGG Rank" class="sorted">BGG Rank <span class="arr">↑</span></th>
            <th onclick="sortBy('Playtime')" data-col="Playtime">Playtime <span class="arr">↕</span></th>
            <th onclick="sortBy('Weight')" data-col="Weight">Weight <span class="arr">↕</span></th>
            <th onclick="sortBy('Min')" data-col="Min">Min ♟ <span class="arr">↕</span></th>
            <th onclick="sortBy('Max')" data-col="Max">Max ♟ <span class="arr">↕</span></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="modal" id="modal">
    <button class="modal-close-btn" onclick="closeModal()">✕</button>
    <div id="modal-inner"><div class="modal-loading">Loading…</div></div>
  </div>
</div>

const games = RAW.map(r => { const o={}; COLS.forEach((c,i)=>o[c]=r[i]); return o; });

const ownerSet = new Set();
games.forEach(g => g['Owned by'].split(',').forEach(o => { const t=o.trim(); if(t) ownerSet.add(t); }));
const owners = [...ownerSet].sort();

let filtered = [...games];
let sortCol = 'BGG Rank';
let sortAsc = true;
let selectedOwners = new Set();
let filtersOpen = false;

const chipsEl = document.getElementById('owner-chips');
owners.forEach(o => {
  const chip = document.createElement('span');
  chip.className = 'owner-chip';
  chip.textContent = o;
  chip.onclick = () => { selectedOwners.has(o) ? (selectedOwners.delete(o), chip.classList.remove('active')) : (selectedOwners.add(o), chip.classList.add('active')); applyFilters(); };
  chipsEl.appendChild(chip);
});

document.getElementById('game-count').textContent = games.length + ' games';
document.getElementById('result-info').textContent = games.length + ' of ' + games.length + ' games';
sortAndRender();

function toggleFilters() {
  filtersOpen = !filtersOpen;
  document.getElementById('filters-panel').classList.toggle('open', filtersOpen);
  document.getElementById('filter-btn').classList.toggle('active', filtersOpen);
}

function n(v) { const x = parseFloat((v||'').replace(',','.')); return isNaN(x) ? null : x; }

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const pMin = n(document.getElementById('f-play-min').value);
  const pMax = n(document.getElementById('f-play-max').value);
  const wMin = n(document.getElementById('f-w-min').value);
  const wMax = n(document.getElementById('f-w-max').value);
  const plMin = n(document.getElementById('f-p-min').value);
  const plMax = n(document.getElementById('f-p-max').value);

  filtered = games.filter(g => {
    if (q && !g['Game'].toLowerCase().includes(q)) return false;
    if (selectedOwners.size > 0) {
      const ow = g['Owned by'].split(',').map(o=>o.trim());
      if (!ow.some(o => selectedOwners.has(o))) return false;
    }
    const play = n(g['Playtime']);
    if (pMin !== null && play !== null && play < pMin) return false;
    if (pMax !== null && play !== null && play > pMax) return false;
    const w = n(g['Weight']);
    if (wMin !== null && w !== null && w < wMin) return false;
    if (wMax !== null && w !== null && w > wMax) return false;
    const mn = n(g['Min']), mx = n(g['Max']);
    if (plMin !== null && mx !== null && mx < plMin) return false;
    if (plMax !== null && mn !== null && mn > plMax) return false;
    return true;
  });
  document.getElementById('result-info').textContent = filtered.length + ' of ' + games.length + ' games';
  sortAndRender();
}

function clearFilters() {
  document.getElementById('search').value = '';
  ['f-play-min','f-play-max','f-w-min','f-w-max','f-p-min','f-p-max'].forEach(id => document.getElementById(id).value = '');
  selectedOwners.clear();
  document.querySelectorAll('.owner-chip').forEach(c => c.classList.remove('active'));
  applyFilters();
}

function sortBy(col) {
  sortAsc = (sortCol === col) ? !sortAsc : true;
  sortCol = col;
  document.querySelectorAll('th').forEach(th => {
    th.classList.toggle('sorted', th.dataset.col === col);
    th.querySelector('.arr').textContent = th.dataset.col === col ? (sortAsc ? '↑' : '↓') : '↕';
  });
  sortAndRender();
}

function rColor(r) {
  if (r >= 8.0) return '#4cc88a';
  if (r >= 7.5) return '#8b7cf8';
  if (r >= 7.0) return '#f5a623';
  return '#9898b8';
}

function sortAndRender() {
  const sorted = [...filtered].sort((a,b) => {
    if (sortCol === 'BGG Rank') {
      const an = parseInt(a[sortCol])||999999, bn = parseInt(b[sortCol])||999999;
      return sortAsc ? an-bn : bn-an;
    }
    const av = a[sortCol], bv = b[sortCol];
    const an = parseFloat((av||'').replace(',','.')), bn = parseFloat((bv||'').replace(',','.'));
    if (!isNaN(an) && !isNaN(bn)) return sortAsc ? an-bn : bn-an;
    return sortAsc ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
  });

  const tbody = document.getElementById('tbody');
  if (!sorted.length) { tbody.innerHTML = '<tr><td colspan="9" class="empty">No games match your filters.</td></tr>'; return; }

  tbody.innerHTML = sorted.map(g => {
    const rating = parseFloat(g['BGG Rating']);
    const rankRaw = parseInt(g['BGG Rank']);
    const rankDisplay = (!rankRaw || rankRaw >= 999999) ? '—' : '#' + rankRaw.toLocaleString();
    const barW = rating ? Math.min(100, Math.round((rating/10)*100)) : 0;
    const col = rating ? rColor(rating) : '#55556a';
    const play = g['Playtime'] ? g['Playtime']+' min' : '—';
    const w = g['Weight'] ? parseFloat(g['Weight']).toFixed(2) : '—';
    const owner = g['Owned by'] || '—';
    const gJson = JSON.stringify(g).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<tr onclick="openGame('${gJson}')">
      <td class="game-name" title="${g['Game'].replace(/"/g,'&quot;')}">${g['Game']}</td>
      <td class="mono">${g['Year']||'—'}</td>
      <td><span class="badge-owner" title="${owner}">${owner}</span></td>
      <td><div class="rating-cell"><span class="rating-val" style="color:${col}">${rating ? rating.toFixed(1) : '—'}</span><div class="rbar"><div class="rbar-fill" style="width:${barW}%;background:${col}"></div></div></div></td>
      <td class="mono">${rankDisplay}</td>
      <td class="mono">${play}</td>
      <td class="mono">${w}</td>
      <td class="mono">${g['Min']||'—'}</td>
      <td class="mono">${g['Max']||'—'}</td>
    </tr>`;
  }).join('');
}

function openGame(gJson) {
  const g = JSON.parse(gJson);
  document.getElementById('overlay').classList.add('show');
  document.getElementById('modal-inner').innerHTML = '<div class="modal-loading">Loading from BoardGameGeek…</div>';
  fetchBGG(g['ID'], g);
}

async function fetchBGG(id, g) {
  try {
    const res = await fetch(`https://boardgamegeek.com/xmlapi2/thing?id=${id}&stats=1`);
    if (!res.ok) throw 0;
    const xml = new DOMParser().parseFromString(await res.text(), 'text/xml');
    const item = xml.querySelector('item');
    if (!item) throw 0;
    const get = (sel, attr='value') => { const el=item.querySelector(sel); return el?(attr?el.getAttribute(attr):el.textContent):null; };
    const getAll = (sel, attr='value') => [...item.querySelectorAll(sel)].map(el=>attr?el.getAttribute(attr):el.textContent);
    const name = get('name[type="primary"]') || g['Game'];
    const year = get('yearpublished') || g['Year'];
    const thumb = get('thumbnail', null);
    const desc = get('description', null);
    const minp = get('minplayers') || g['Min'];
    const maxp = get('maxplayers') || g['Max'];
    const time = get('playingtime') || g['Playtime'];
    const minage = get('minage');
    const avgR = get('statistics > ratings > average');
    const bggRankEl = item.querySelector('rank[name="boardgame"]');
    const bggRank = bggRankEl ? bggRankEl.getAttribute('value') : null;
    const avgW = get('statistics > ratings > averageweight');
    const cats = getAll('link[type="boardgamecategory"]').slice(0,8);
    const mechs = getAll('link[type="boardgamemechanic"]').slice(0,8);
    const designers = getAll('link[type="boardgamedesigner"]').filter(d=>d!=='(Uncredited)').slice(0,4);
    const descClean = desc ? decodeHTML(desc).replace(/<[^>]+>/g,'').slice(0,500)+'…' : '';
    const ratingNum = avgR ? parseFloat(avgR) : null;
    const weightNum = avgW ? parseFloat(avgW) : null;
    const rankDisplay = (bggRank && bggRank !== 'Not Ranked') ? '#'+parseInt(bggRank).toLocaleString() : null;
    document.getElementById('modal-inner').innerHTML = `
      <div class="modal-hero">
        ${thumb ? `<img class="modal-img" src="${thumb}" alt="" onerror="this.outerHTML='<div class=modal-img-ph>🎲</div>'">` : '<div class="modal-img-ph">🎲</div>'}
        <div class="modal-title-area">
          <div class="modal-title">${name}</div>
          <div class="modal-year">${year}${designers.length?' · '+designers.join(', '):''}</div>
          <div class="modal-tags">
            ${ratingNum ? `<span class="mtag hi">⭐ ${ratingNum.toFixed(2)}</span>` : ''}
            ${rankDisplay ? `<span class="mtag">${rankDisplay} BGG</span>` : ''}
            ${weightNum ? `<span class="mtag">⚙ ${weightNum.toFixed(2)}</span>` : ''}
          </div>
          <a class="bgg-btn" href="https://boardgamegeek.com/boardgame/${id}" target="_blank">View on BoardGameGeek ↗</a>
        </div>
      </div>
      <div class="modal-body">
        <div class="modal-stats">
          <div class="mstat"><div class="mstat-val">${minp}–${maxp}</div><div class="mstat-lbl">Players</div></div>
          <div class="mstat"><div class="mstat-val">${time} min</div><div class="mstat-lbl">Playtime</div></div>
          <div class="mstat"><div class="mstat-val">${minage ? minage+'+' : '—'}</div><div class="mstat-lbl">Age</div></div>
          <div class="mstat"><div class="mstat-val" style="font-size:12px;line-height:1.3;padding-top:4px">${g['Owned by']}</div><div class="mstat-lbl">Owner</div></div>
        </div>
        ${descClean ? `<p class="modal-desc">${descClean}</p>` : ''}
        ${g['Best with'] ? `<div class="section-lbl">Best with</div><div class="chips"><span class="chip">${g['Best with']}</span></div>` : ''}
        ${designers.length ? `<div class="section-lbl">Designers</div><div class="chips">${designers.map(d=>`<span class="chip">${d}</span>`).join('')}</div>` : ''}
        ${cats.length ? `<div class="section-lbl">Categories</div><div class="chips">${cats.map(c=>`<span class="chip">${c}</span>`).join('')}</div>` : ''}
        ${mechs.length ? `<div class="section-lbl">Mechanics</div><div class="chips">${mechs.map(m=>`<span class="chip">${m}</span>`).join('')}</div>` : ''}
      </div>`;
  } catch(e) { renderBasic(g); }
}

function decodeHTML(s) { const t=document.createElement('textarea'); t.innerHTML=s; return t.value; }

function renderBasic(g) {
  const rn = parseFloat(g['BGG Rating']);
  document.getElementById('modal-inner').innerHTML = `
    <div class="modal-hero">
      <div class="modal-img-ph">🎲</div>
      <div class="modal-title-area">
        <div class="modal-title">${g['Game']}</div>
        <div class="modal-year">${g['Year']||''}</div>
        <div class="modal-tags">${!isNaN(rn)?`<span class="mtag hi">⭐ ${rn.toFixed(1)}</span>`:''}</div>
        <a class="bgg-btn" href="https://boardgamegeek.com/boardgame/${g['ID']}" target="_blank">View on BoardGameGeek ↗</a>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-stats">
        <div class="mstat"><div class="mstat-val">${g['Min']}–${g['Max']}</div><div class="mstat-lbl">Players</div></div>
        <div class="mstat"><div class="mstat-val">${g['Playtime']} min</div><div class="mstat-lbl">Playtime</div></div>
        <div class="mstat"><div class="mstat-val">${parseFloat(g['Weight']).toFixed(2)}</div><div class="mstat-lbl">Weight</div></div>
        <div class="mstat"><div class="mstat-val" style="font-size:12px;line-height:1.3;padding-top:4px">${g['Owned by']}</div><div class="mstat-lbl">Owner</div></div>
      </div>
      <p class="modal-err">BGG details could not be loaded — check your internet connection.</p>
    </div>`;
}

function closeOverlay(e) { if (e.target===document.getElementById('overlay')) closeModal(); }
function closeModal() { document.getElementById('overlay').classList.remove('show'); }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
</script>
