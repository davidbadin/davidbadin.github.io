<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RVFBGNSC · Board Games</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d12;
  --bg2: #13131a;
  --bg3: #1a1a24;
  --bg4: #22222f;
  --bg5: #2c2c3e;
  --border: #252535;
  --border2: #303048;
  --text: #e8e8f2;
  --text2: #a0a0c0;
  --text3: #55556e;
  --accent: #7c6cf5;
  --accent2: #5b4fd4;
  --accent-dim: rgba(124,108,245,0.13);
  --accent-border: rgba(124,108,245,0.32);
  --green: #3ecf7e;
  --green-dim: rgba(62,207,126,0.12);
  --orange: #f59b3e;
  --orange-dim: rgba(245,155,62,0.12);
  --red: #e05c5c;
  --red-dim: rgba(224,92,92,0.12);
  --w-green: #3ecf7e;
  --w-orange: #f59b3e;
  --w-red: #e05c5c;
  --radius: 10px;
  --radius-lg: 14px;
  --radius-xl: 18px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg5); border-radius: 3px; }
a { color: var(--accent); text-decoration: none; }

/* ── HEADER ── */
.header {
  position: relative; overflow: hidden;
  padding: 36px 24px 32px;
  background: linear-gradient(180deg, #0d1020 0%, #0d0d12 100%);
}
.header::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 70% 60% at 20% 50%, rgba(62,100,207,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 50% 80% at 75% 30%, rgba(62,180,150,0.13) 0%, transparent 65%),
    radial-gradient(ellipse 40% 50% at 50% 90%, rgba(124,108,245,0.10) 0%, transparent 60%);
  animation: aurora 12s ease-in-out infinite alternate;
}
@keyframes aurora {
  0%   { opacity: 0.7; transform: translateY(0) scaleX(1); }
  50%  { opacity: 1;   transform: translateY(-6px) scaleX(1.04); }
  100% { opacity: 0.8; transform: translateY(3px) scaleX(0.98); }
}
.header-inner { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; }
.header-title { display: flex; align-items: center; gap: 14px; margin-bottom: 6px; }
.logo { font-size: 28px; filter: drop-shadow(0 0 8px rgba(124,108,245,0.5)); }
.header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.4px; color: var(--text); }
.header h1 span { background: linear-gradient(135deg, #a090ff, #5ee8c0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.header-sub { font-size: 13px; color: var(--text3); margin-top: 2px; }
.header-badges { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.hbadge { font-size: 11px; font-weight: 500; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: var(--text2); padding: 3px 10px; border-radius: 20px; }

/* ── MAIN ── */
.main { max-width: 900px; margin: 0 auto; padding: 20px 16px 80px; }

/* ── RANDOM BTN ── */
.random-btn-wrap { margin-bottom: 18px; }
.random-btn {
  width: 100%; padding: 14px 20px; border-radius: var(--radius-lg);
  background: linear-gradient(135deg, rgba(124,108,245,0.2), rgba(62,180,150,0.15));
  border: 1px solid rgba(124,108,245,0.35);
  color: var(--text); font-size: 15px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: all 0.2s; font-family: 'Inter', sans-serif;
  letter-spacing: -0.2px;
}
.random-btn:hover { background: linear-gradient(135deg, rgba(124,108,245,0.3), rgba(62,180,150,0.22)); border-color: rgba(124,108,245,0.5); transform: translateY(-1px); }
.random-btn:active { transform: translateY(0); }

/* ── CONTROLS ── */
.controls { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.search-wrap { flex: 1; min-width: 160px; position: relative; }
.search-wrap input {
  width: 100%; background: var(--bg2); border: 1px solid var(--border);
  color: var(--text); padding: 10px 14px 10px 38px; border-radius: var(--radius);
  font-size: 14px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.15s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--text3); }
.si { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 15px; pointer-events: none; }
.ctrl-btn {
  background: var(--bg2); border: 1px solid var(--border); color: var(--text2);
  padding: 10px 14px; border-radius: var(--radius); cursor: pointer;
  font-size: 13px; font-weight: 500; font-family: 'Inter', sans-serif;
  transition: all 0.15s; white-space: nowrap; display: flex; align-items: center; gap: 6px;
}
.ctrl-btn:hover { border-color: var(--border2); color: var(--text); background: var(--bg3); }
.ctrl-btn.active { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }

/* ── PANEL (filters/sort shared) ── */
.panel { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px; margin-bottom: 14px; display: none; }
.panel.open { display: block; }
.panel-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 10px; }
.panel-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px 18px; }
.fg { display: flex; flex-direction: column; gap: 6px; }
.fg > label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; }
.fg input, .fg select {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  padding: 8px 10px; border-radius: var(--radius); font-size: 13px; font-family: 'Inter', sans-serif;
  outline: none; transition: border-color 0.15s;
}
.fg input:focus, .fg select:focus { border-color: var(--accent); }
.rr { display: flex; align-items: center; gap: 6px; }
.rr input { flex: 1; min-width: 0; }
.rr span { color: var(--text3); font-size: 12px; }
.owner-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.oc {
  font-size: 12px; font-weight: 500; padding: 5px 11px; border-radius: 20px; cursor: pointer;
  background: var(--bg3); border: 1px solid var(--border); color: var(--text2);
  transition: all 0.15s;
}
.oc:hover { border-color: var(--border2); color: var(--text); }
.oc.active { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }
.panel-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
.result-info { font-size: 11px; font-weight: 500; color: var(--text3); }

/* Sort options */
.sort-opts { display: flex; flex-wrap: wrap; gap: 6px; }
.sort-opt {
  font-size: 12px; font-weight: 500; padding: 6px 12px; border-radius: 20px;
  background: var(--bg3); border: 1px solid var(--border); color: var(--text2);
  cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 5px;
}
.sort-opt:hover { border-color: var(--border2); color: var(--text); }
.sort-opt.active { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }

/* ── GAME LIST ── */
.game-list { display: flex; flex-direction: column; gap: 8px; }
.game-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 14px 16px; cursor: pointer; transition: all 0.15s; position: relative;
}
.game-card:hover { background: var(--bg3); border-color: var(--border2); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
.game-card:active { transform: translateY(0); }
.gc-row1 { display: flex; align-items: baseline; gap: 8px; margin-bottom: 5px; flex-wrap: wrap; }
.gc-rank { font-size: 11px; font-weight: 600; color: var(--text3); min-width: 36px; }
.gc-rank.top { color: var(--accent); }
.gc-name { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.3; flex: 1; min-width: 120px; }
.gc-year { font-size: 12px; color: var(--text3); white-space: nowrap; }
.gc-row2 { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 5px; }
.gc-meta { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 4px; }
.gc-meta .lbl { color: var(--text3); font-size: 11px; }
.gc-rating { font-size: 12px; font-weight: 600; }
.weight-g { color: var(--w-green); }
.weight-o { color: var(--w-orange); }
.weight-r { color: var(--w-red); }
.gc-row3 { font-size: 12px; color: var(--text3); }
.gc-row3 span { color: var(--text2); }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }

/* ── LOADING ── */
.loading-wrap { text-align: center; padding: 60px 20px; }
.loading-spinner { width: 32px; height: 32px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--text3); }
.error-wrap { text-align: center; padding: 40px 20px; }
.error-wrap p { color: var(--red); font-size: 13px; margin-bottom: 10px; }
.error-wrap small { color: var(--text3); font-size: 12px; }

/* ── MODAL ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 300; display: none; align-items: flex-end; justify-content: center; padding: 0; backdrop-filter: blur(6px); }
.overlay.show { display: flex; }
@media (min-width: 600px) { .overlay { align-items: center; padding: 20px; } }
.modal {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  width: 100%; max-width: 640px; max-height: 90vh; overflow-y: auto;
  animation: slideUp 0.25s ease;
}
@media (min-width: 600px) { .modal { border-radius: var(--radius-xl); } }
@keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-drag { width: 36px; height: 4px; background: var(--bg5); border-radius: 2px; margin: 12px auto 0; }
@media (min-width: 600px) { .modal-drag { display: none; } }
.modal-header { padding: 16px 18px 0; display: flex; gap: 14px; position: relative; }
.modal-close { position: absolute; top: 0; right: 18px; background: var(--bg4); border: 1px solid var(--border); color: var(--text2); width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; transition: all 0.15s; }
.modal-close:hover { background: var(--bg5); color: var(--text); }
.modal-thumb { width: 90px; height: 90px; border-radius: var(--radius-lg); object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; background: var(--bg4); }
.modal-thumb-ph { width: 90px; height: 90px; border-radius: var(--radius-lg); border: 1px solid var(--border); flex-shrink: 0; background: var(--bg4); display: flex; align-items: center; justify-content: center; font-size: 28px; color: var(--text3); }
.modal-title-area { flex: 1; min-width: 0; padding-top: 2px; padding-right: 36px; }
.modal-title { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.3; margin-bottom: 3px; }
.modal-year-line { font-size: 12px; color: var(--text3); margin-bottom: 8px; }
.modal-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.mtag { font-size: 11px; font-weight: 500; background: var(--bg4); border: 1px solid var(--border); color: var(--text2); padding: 2px 8px; border-radius: 20px; }
.mtag.hi { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }
.modal-body { padding: 16px 18px 24px; }
.modal-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
.mstat { background: var(--bg3); border-radius: var(--radius); padding: 10px 8px; text-align: center; }
.mstat-val { font-size: 16px; font-weight: 700; color: var(--text); }
.mstat-lbl { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); margin-top: 3px; }
.modal-desc { font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 16px; }
.section-lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-bottom: 7px; }
.chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }
.chip { font-size: 12px; background: var(--bg3); border: 1px solid var(--border); color: var(--text2); padding: 4px 9px; border-radius: var(--radius); }
.bgg-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--accent); background: var(--accent-dim); border: 1px solid var(--accent-border); padding: 8px 16px; border-radius: var(--radius); text-decoration: none; transition: background 0.15s; }
.bgg-btn:hover { background: rgba(124,108,245,0.22); }
.modal-loading-inner { text-align: center; padding: 50px 20px; color: var(--text3); font-size: 13px; }

/* ── RANDOM MODAL ── */
.random-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 400; display: none; align-items: center; justify-content: center; padding: 16px; backdrop-filter: blur(8px); }
.random-overlay.show { display: flex; }
.random-modal {
  background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius-xl);
  width: 100%; max-width: 480px; max-height: 92vh; overflow-y: auto;
  animation: slideUp 0.25s ease; padding: 24px;
}
.random-modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
.random-modal .sub { font-size: 13px; color: var(--text3); margin-bottom: 20px; }
.rm-section { margin-bottom: 20px; }
.rm-section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-bottom: 10px; }
.rm-owner-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.roc { font-size: 13px; font-weight: 500; padding: 7px 14px; border-radius: 20px; cursor: pointer; background: var(--bg3); border: 1px solid var(--border); color: var(--text2); transition: all 0.15s; }
.roc:hover { border-color: var(--border2); color: var(--text); }
.roc.active { background: var(--green-dim); border-color: rgba(62,207,126,0.4); color: var(--green); }
.rm-player-count { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
.pm-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg3); color: var(--text2); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; font-family: 'Inter', sans-serif; }
.pm-btn:hover { border-color: var(--border2); color: var(--text); background: var(--bg4); }
.pm-display { font-size: 20px; font-weight: 700; color: var(--text); min-width: 40px; text-align: center; }
.pm-label { font-size: 13px; color: var(--text3); }
.rm-go-btn { width: 100%; padding: 14px; border-radius: var(--radius-lg); background: linear-gradient(135deg, var(--accent), #5b4fd4); border: none; color: white; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; transition: opacity 0.15s, transform 0.15s; margin-bottom: 10px; }
.rm-go-btn:hover { opacity: 0.9; transform: translateY(-1px); }
.rm-go-btn:active { transform: translateY(0); }
.rm-close-link { display: block; text-align: center; font-size: 13px; color: var(--text3); cursor: pointer; padding: 6px; }
.rm-close-link:hover { color: var(--text2); }

/* Result card */
.result-card { background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 18px; margin-bottom: 16px; }
.result-card-name { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.result-card-year { font-size: 12px; color: var(--text3); margin-bottom: 12px; }
.result-card-stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 14px; }
.rc-stat { font-size: 13px; color: var(--text2); }
.rc-stat strong { color: var(--text); font-weight: 600; }
.result-img { width: 100%; max-height: 180px; object-fit: contain; border-radius: var(--radius); margin-bottom: 12px; background: var(--bg4); }
.rm-actions { display: flex; gap: 8px; }
.rm-action-btn { flex: 1; padding: 11px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg4); color: var(--text2); font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; }
.rm-action-btn:hover { background: var(--bg5); color: var(--text); }
.rm-action-btn.primary { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }
.rm-action-btn.primary:hover { background: rgba(124,108,245,0.22); }
.rm-msg { text-align: center; font-size: 13px; color: var(--text3); padding: 10px 0; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">
    <div class="header-title">
      <span class="logo">👹</span>
      <h1><span>RVFBGNSC</span> Games</h1>
    </div>
    <div class="header-sub">Board game collection tracker</div>
    <div class="header-badges">
      <span class="hbadge" id="hb-count">Loading…</span>
      <span class="hbadge" id="hb-owners"></span>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- Random game button -->
  <div class="random-btn-wrap">
    <button class="random-btn" onclick="openRandom()">🎲 What should we play tonight?</button>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="search-wrap">
      <span class="si">⌕</span>
      <input type="text" id="search" placeholder="Search games…" oninput="applyFilters()">
    </div>
    <button class="ctrl-btn" id="sort-btn" onclick="togglePanel('sort')">↕ Sort</button>
    <button class="ctrl-btn" id="filter-btn" onclick="togglePanel('filter')">⚙ Filter</button>
    <button class="ctrl-btn" onclick="clearAll()">✕</button>
  </div>

  <!-- Sort panel -->
  <div class="panel" id="sort-panel">
    <div class="panel-label">Sort by</div>
    <div class="sort-opts" id="sort-opts">
      <span class="sort-opt active" data-col="BGG Rank" data-asc="true" onclick="setSortOpt(this)">BGG Rank ↑</span>
      <span class="sort-opt" data-col="BGG Rating" data-asc="false" onclick="setSortOpt(this)">Rating ↓</span>
      <span class="sort-opt" data-col="Game" data-asc="true" onclick="setSortOpt(this)">Name A–Z</span>
      <span class="sort-opt" data-col="Game" data-asc="false" onclick="setSortOpt(this)">Name Z–A</span>
      <span class="sort-opt" data-col="Year" data-asc="false" onclick="setSortOpt(this)">Newest</span>
      <span class="sort-opt" data-col="Year" data-asc="true" onclick="setSortOpt(this)">Oldest</span>
      <span class="sort-opt" data-col="Playtime" data-asc="true" onclick="setSortOpt(this)">Playtime ↑</span>
      <span class="sort-opt" data-col="Playtime" data-asc="false" onclick="setSortOpt(this)">Playtime ↓</span>
      <span class="sort-opt" data-col="Weight" data-asc="true" onclick="setSortOpt(this)">Weight ↑</span>
      <span class="sort-opt" data-col="Weight" data-asc="false" onclick="setSortOpt(this)">Weight ↓</span>
      <span class="sort-opt" data-col="Min" data-asc="true" onclick="setSortOpt(this)">Min players ↑</span>
      <span class="sort-opt" data-col="Max" data-asc="false" onclick="setSortOpt(this)">Max players ↓</span>
    </div>
  </div>

  <!-- Filter panel -->
  <div class="panel" id="filter-panel">
    <div class="panel-label">Filter by</div>
    <div class="panel-grid">
      <div class="fg" style="grid-column: 1 / -1;">
        <label>Owner (any match)</label>
        <div class="owner-chips" id="owner-chips"></div>
      </div>
      <div class="fg">
        <label>Playtime (min)</label>
        <div class="rr">
          <input type="number" id="f-play-min" placeholder="0" min="0" oninput="applyFilters()">
          <span>–</span>
          <input type="number" id="f-play-max" placeholder="∞" min="0" oninput="applyFilters()">
        </div>
      </div>
      <div class="fg">
        <label>Weight (1–5)</label>
        <div class="rr">
          <input type="number" id="f-w-min" placeholder="1.0" min="1" max="5" step="0.1" oninput="applyFilters()">
          <span>–</span>
          <input type="number" id="f-w-max" placeholder="5.0" min="1" max="5" step="0.1" oninput="applyFilters()">
        </div>
      </div>
      <div class="fg">
        <label>Players (range fits)</label>
        <div class="rr">
          <input type="number" id="f-p-min" placeholder="1" min="1" oninput="applyFilters()">
          <span>–</span>
          <input type="number" id="f-p-max" placeholder="∞" min="1" oninput="applyFilters()">
        </div>
      </div>
    </div>
    <div class="panel-footer">
      <span class="result-info" id="result-info"></span>
    </div>
  </div>

  <!-- Game list -->
  <div id="game-list-wrap">
    <div class="loading-wrap">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading your collection…</div>
    </div>
  </div>
</div>

<!-- GAME DETAIL MODAL -->
<div class="overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="modal" id="detail-modal">
    <div class="modal-drag"></div>
    <div id="detail-inner"><div class="modal-loading-inner">Loading…</div></div>
  </div>
</div>

<!-- RANDOM MODAL -->
<div class="random-overlay" id="random-overlay">
  <div class="random-modal" id="random-modal">
    <div id="random-inner"></div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const SHEET_ID = '2PACX-1vR7eM-cNDkga-lVJPBBzhqcyXoFiz2d5goit8T_2-SU-fIOpJSIxx-TW4bh0ZNZcRu06fjOQUdSj1nA';
const CSV_URL = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?output=csv`;

// ── STATE ───────────────────────────────────────────────────────────────────
let allGames = [];
let filtered = [];
let sortCol = 'BGG Rank';
let sortAsc = true;
let selectedOwners = new Set();
let activePanel = null;
let lastRandomId = null;

// ── LOAD ────────────────────────────────────────────────────────────────────
async function loadGames() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    allGames = parseCSV(text);
    initOwnerChips();
    initRandomOwnerChips();
    const owners = new Set();
    allGames.forEach(g => g['Owned by'].split(',').forEach(o => { const t=o.trim(); if(t) owners.add(t); }));
    document.getElementById('hb-count').textContent = allGames.length + ' games';
    document.getElementById('hb-owners').textContent = owners.size + ' owners';
    document.getElementById('result-info').textContent = allGames.length + ' of ' + allGames.length + ' games';
    applyFilters();
  } catch(e) {
    document.getElementById('game-list-wrap').innerHTML = `
      <div class="error-wrap">
        <p>⚠ Could not load game data</p>
        <small>Make sure the Google Sheet is published: File → Share → Publish to web → CSV</small>
      </div>`;
  }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  // Find the header row (contains "ID" and "Game")
  let headerIdx = 0;
  for (let i = 0; i < Math.min(10, lines.length); i++) {
    if (lines[i].includes('ID') && lines[i].includes('Game')) { headerIdx = i; break; }
  }
  const headers = parseRow(lines[headerIdx]);
  const games = [];
  for (let i = headerIdx + 1; i < lines.length; i++) {
    const vals = parseRow(lines[i]);
    const obj = {};
    headers.forEach((h, idx) => obj[h.trim()] = (vals[idx] || '').trim().replace(/,/g, '.'));
    if (obj['ID'] && obj['Game']) {
      // fix decimal separator in numeric fields
      ['BGG Rating','Weight'].forEach(k => { if (obj[k]) obj[k] = obj[k].replace(',','.'); });
      games.push(obj);
    }
  }
  return games;
}

function parseRow(line) {
  const res = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { res.push(cur); cur = ''; }
    else cur += c;
  }
  res.push(cur);
  return res;
}

// ── OWNER CHIPS ─────────────────────────────────────────────────────────────
function getOwners() {
  const s = new Set();
  allGames.forEach(g => g['Owned by'].split(',').forEach(o => { const t=o.trim(); if(t) s.add(t); }));
  return [...s].sort();
}

function initOwnerChips() {
  const wrap = document.getElementById('owner-chips');
  wrap.innerHTML = '';
  getOwners().forEach(o => {
    const chip = document.createElement('span');
    chip.className = 'oc'; chip.textContent = o;
    chip.onclick = () => {
      selectedOwners.has(o) ? (selectedOwners.delete(o), chip.classList.remove('active'))
                            : (selectedOwners.add(o), chip.classList.add('active'));
      applyFilters();
    };
    wrap.appendChild(chip);
  });
}

// ── FILTER / SORT ───────────────────────────────────────────────────────────
function n(v) { const x=parseFloat((v||'').toString().replace(',','.')); return isNaN(x)?null:x; }

function applyFilters() {
  const q = (document.getElementById('search').value||'').toLowerCase();
  const pMin = n(document.getElementById('f-play-min').value);
  const pMax = n(document.getElementById('f-play-max').value);
  const wMin = n(document.getElementById('f-w-min').value);
  const wMax = n(document.getElementById('f-w-max').value);
  const plMin = n(document.getElementById('f-p-min').value);
  const plMax = n(document.getElementById('f-p-max').value);

  filtered = allGames.filter(g => {
    if (q && !g['Game'].toLowerCase().includes(q)) return false;
    if (selectedOwners.size > 0) {
      const ow = g['Owned by'].split(',').map(o=>o.trim());
      if (!ow.some(o => selectedOwners.has(o))) return false;
    }
    const play = n(g['Playtime']);
    if (pMin!==null && play!==null && play<pMin) return false;
    if (pMax!==null && play!==null && play>pMax) return false;
    const w = n(g['Weight']);
    if (wMin!==null && w!==null && w<wMin) return false;
    if (wMax!==null && w!==null && w>wMax) return false;
    const mn=n(g['Min']), mx=n(g['Max']);
    if (plMin!==null && mx!==null && mx<plMin) return false;
    if (plMax!==null && mn!==null && mn>plMax) return false;
    return true;
  });
  document.getElementById('result-info').textContent = filtered.length + ' of ' + allGames.length + ' games';
  renderList();
}

function setSortOpt(el) {
  document.querySelectorAll('.sort-opt').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  sortCol = el.dataset.col;
  sortAsc = el.dataset.asc === 'true';
  renderList();
}

function togglePanel(name) {
  const panel = document.getElementById(name + '-panel');
  const btn = document.getElementById(name + '-btn');
  if (activePanel === name) {
    panel.classList.remove('open'); btn.classList.remove('active');
    activePanel = null;
  } else {
    ['sort','filter'].forEach(p => {
      document.getElementById(p+'-panel').classList.remove('open');
      document.getElementById(p+'-btn').classList.remove('active');
    });
    panel.classList.add('open'); btn.classList.add('active');
    activePanel = name;
  }
}

function clearAll() {
  document.getElementById('search').value = '';
  ['f-play-min','f-play-max','f-w-min','f-w-max','f-p-min','f-p-max'].forEach(id => document.getElementById(id).value = '');
  selectedOwners.clear();
  document.querySelectorAll('.oc').forEach(c => c.classList.remove('active'));
  applyFilters();
}

// ── RENDER LIST ──────────────────────────────────────────────────────────────
function weightClass(w) {
  const v = n(w);
  if (v === null || v < 3) return 'weight-g';
  if (v < 4) return 'weight-o';
  return 'weight-r';
}

function renderList() {
  const sorted = [...filtered].sort((a, b) => {
    if (sortCol === 'BGG Rank') {
      const an = parseInt(a[sortCol])||999999, bn = parseInt(b[sortCol])||999999;
      return sortAsc ? an-bn : bn-an;
    }
    const av = a[sortCol]||'', bv = b[sortCol]||'';
    const an = n(av), bn = n(bv);
    if (an!==null && bn!==null) return sortAsc ? an-bn : bn-an;
    return sortAsc ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
  });

  const wrap = document.getElementById('game-list-wrap');
  if (!sorted.length) {
    wrap.innerHTML = '<div class="empty-state">No games match your filters 🎯</div>';
    return;
  }

  wrap.innerHTML = '<div class="game-list" id="game-list"></div>';
  const list = document.getElementById('game-list');

  sorted.forEach(g => {
    const rankRaw = parseInt(g['BGG Rank'])||999999;
    const rankDisplay = rankRaw >= 999999 ? '—' : '#' + rankRaw.toLocaleString();
    const isTop = rankRaw <= 100;
    const rating = n(g['BGG Rating']);
    const weight = n(g['Weight']);
    const wClass = weightClass(g['Weight']);
    const wDisplay = weight ? weight.toFixed(2) : '—';
    const play = g['Playtime'] ? g['Playtime'] + ' min' : '—';
    const players = (g['Min'] && g['Max']) ? `${g['Min']}–${g['Max']}` : (g['Min']||g['Max']||'—');

    const card = document.createElement('div');
    card.className = 'game-card';
    card.innerHTML = `
      <div class="gc-row1">
        <span class="gc-rank ${isTop?'top':''}">${rankDisplay}</span>
        <span class="gc-name">${g['Game']}</span>
        <span class="gc-year">(${g['Year']||'?'})</span>
      </div>
      <div class="gc-row2">
        <span class="gc-meta"><span class="lbl">⏱</span> ${play}</span>
        <span class="gc-meta"><span class="lbl">👥</span> ${players} players</span>
        <span class="gc-meta"><span class="lbl">⚙</span> <span class="${wClass}">${wDisplay}</span></span>
        ${rating ? `<span class="gc-meta"><span class="lbl">⭐</span> <span class="gc-rating">${rating.toFixed(1)}</span></span>` : ''}
      </div>
      <div class="gc-row3">In collection: <span>${g['Owned by']||'—'}</span></div>`;
    card.onclick = () => openDetail(g);
    list.appendChild(card);
  });
}

// ── DETAIL MODAL ─────────────────────────────────────────────────────────────
function openDetail(g) {
  document.getElementById('detail-overlay').classList.add('show');
  document.getElementById('detail-inner').innerHTML = '<div class="modal-loading-inner">Loading from BoardGameGeek…</div>';
  fetchBGGDetail(g['ID'], g);
}

async function fetchBGGDetail(id, g) {
  try {
    const res = await fetch(`https://boardgamegeek.com/xmlapi2/thing?id=${id}&stats=1`);
    if (!res.ok) throw 0;
    const xml = new DOMParser().parseFromString(await res.text(), 'text/xml');
    const item = xml.querySelector('item');
    if (!item) throw 0;
    const get = (sel, attr='value') => { const el=item.querySelector(sel); return el?(attr?el.getAttribute(attr):el.textContent):null; };
    const getAll = (sel, attr='value') => [...item.querySelectorAll(sel)].map(el=>attr?el.getAttribute(attr):el.textContent);

    const name = get('name[type="primary"]') || g['Game'];
    const year = get('yearpublished') || g['Year'];
    const thumb = get('thumbnail', null);
    const desc = get('description', null);
    const minp = get('minplayers') || g['Min'];
    const maxp = get('maxplayers') || g['Max'];
    const time = get('playingtime') || g['Playtime'];
    const minage = get('minage');
    const avgR = parseFloat(get('statistics > ratings > average') || 0);
    const rankEl = item.querySelector('rank[name="boardgame"]');
    const bggRank = rankEl ? rankEl.getAttribute('value') : null;
    const avgW = parseFloat(get('statistics > ratings > averageweight') || 0);
    const cats = getAll('link[type="boardgamecategory"]').slice(0,6);
    const mechs = getAll('link[type="boardgamemechanic"]').slice(0,6);
    const designers = getAll('link[type="boardgamedesigner"]').filter(d=>d!=='(Uncredited)').slice(0,3);
    const rankDisplay = (bggRank && bggRank !== 'Not Ranked') ? '#'+parseInt(bggRank).toLocaleString() : null;
    const descClean = desc ? decodeHTML(desc).replace(/<[^>]+>/g,'').slice(0,400)+'…' : '';
    const wClass = weightClass(avgW.toFixed(2));

    document.getElementById('detail-inner').innerHTML = `
      <div class="modal-header">
        ${thumb ? `<img class="modal-thumb" src="${thumb}" onerror="this.outerHTML='<div class=modal-thumb-ph>🎲</div>'">` : '<div class="modal-thumb-ph">🎲</div>'}
        <div class="modal-title-area">
          <div class="modal-title">${name}</div>
          <div class="modal-year-line">${year}${designers.length?' · '+designers.join(', '):''}</div>
          <div class="modal-tags">
            ${avgR ? `<span class="mtag hi">⭐ ${avgR.toFixed(2)}</span>` : ''}
            ${rankDisplay ? `<span class="mtag">${rankDisplay}</span>` : ''}
            ${avgW ? `<span class="mtag ${wClass}">⚙ ${avgW.toFixed(2)}</span>` : ''}
          </div>
        </div>
        <button class="modal-close" onclick="closeDetailBtn()">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-stats">
          <div class="mstat"><div class="mstat-val">${minp}–${maxp}</div><div class="mstat-lbl">Players</div></div>
          <div class="mstat"><div class="mstat-val">${time}m</div><div class="mstat-lbl">Playtime</div></div>
          <div class="mstat"><div class="mstat-val">${minage?minage+'+':'—'}</div><div class="mstat-lbl">Age</div></div>
          <div class="mstat"><div class="mstat-val" style="font-size:11px;line-height:1.4;padding-top:3px">${g['Owned by']}</div><div class="mstat-lbl">Owner</div></div>
        </div>
        ${g['Best with'] ? `<div class="section-lbl">Best with</div><div class="chips"><span class="chip">${g['Best with']}</span></div>` : ''}
        ${descClean ? `<p class="modal-desc">${descClean}</p>` : ''}
        ${cats.length ? `<div class="section-lbl">Categories</div><div class="chips">${cats.map(c=>`<span class="chip">${c}</span>`).join('')}</div>` : ''}
        ${mechs.length ? `<div class="section-lbl">Mechanics</div><div class="chips">${mechs.map(m=>`<span class="chip">${m}</span>`).join('')}</div>` : ''}
        <a class="bgg-btn" href="https://boardgamegeek.com/boardgame/${id}" target="_blank">Open on BoardGameGeek ↗</a>
      </div>`;
  } catch(e) {
    document.getElementById('detail-inner').innerHTML = `
      <div class="modal-header">
        <div class="modal-thumb-ph">🎲</div>
        <div class="modal-title-area">
          <div class="modal-title">${g['Game']}</div>
          <div class="modal-year-line">${g['Year']||''}</div>
          <div class="modal-tags"><span class="mtag">${g['BGG Rating']?'⭐ '+g['BGG Rating']:''}</span></div>
        </div>
        <button class="modal-close" onclick="closeDetailBtn()">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-stats">
          <div class="mstat"><div class="mstat-val">${g['Min']}–${g['Max']}</div><div class="mstat-lbl">Players</div></div>
          <div class="mstat"><div class="mstat-val">${g['Playtime']}m</div><div class="mstat-lbl">Playtime</div></div>
          <div class="mstat"><div class="mstat-val">${parseFloat(g['Weight']||0).toFixed(1)}</div><div class="mstat-lbl">Weight</div></div>
          <div class="mstat"><div class="mstat-val" style="font-size:11px;line-height:1.4;padding-top:3px">${g['Owned by']}</div><div class="mstat-lbl">Owner</div></div>
        </div>
        <a class="bgg-btn" href="https://boardgamegeek.com/boardgame/${g['ID']}" target="_blank">Open on BoardGameGeek ↗</a>
      </div>`;
  }
}

function decodeHTML(s) { const t=document.createElement('textarea'); t.innerHTML=s; return t.value; }
function closeDetail(e) { if(e.target===document.getElementById('detail-overlay')) closeDetailBtn(); }
function closeDetailBtn() { document.getElementById('detail-overlay').classList.remove('show'); }
document.addEventListener('keydown', e => { if(e.key==='Escape') { closeDetailBtn(); closeRandomModal(); } });

// ── RANDOM GAME ──────────────────────────────────────────────────────────────
let randomPlayers = 0;
let randomOwners = new Set();

function initRandomOwnerChips() {
  const wrap = document.getElementById('random-owners-wrap');
  if (!wrap) return;
  wrap.innerHTML = '';
  getOwners().forEach(o => {
    const chip = document.createElement('span');
    chip.className = 'roc'; chip.textContent = o;
    chip.onclick = () => {
      if (randomOwners.has(o)) { randomOwners.delete(o); chip.classList.remove('active'); }
      else { randomOwners.add(o); chip.classList.add('active'); }
      updatePlayerCount();
    };
    wrap.appendChild(chip);
  });
}

function updatePlayerCount() {
  const cnt = randomOwners.size > 0 ? randomOwners.size : randomPlayers;
  document.getElementById('pm-display').textContent = cnt;
  if (randomOwners.size > 0) randomPlayers = randomOwners.size;
}

function openRandom() {
  randomPlayers = 0; randomOwners = new Set();
  document.getElementById('random-overlay').classList.add('show');
  document.getElementById('random-inner').innerHTML = buildRandomStep1();
  initRandomOwnerChips();
}

function buildRandomStep1() {
  return `
    <h2>🎲 Tonight's game</h2>
    <p class="sub">Who's playing? Select players or set a count.</p>
    <div class="rm-section">
      <div class="rm-section-title">Players (tap to select)</div>
      <div class="rm-owner-chips" id="random-owners-wrap"></div>
      <div class="rm-player-count">
        <button class="pm-btn" onclick="changeCount(-1)">−</button>
        <div class="pm-display" id="pm-display">0</div>
        <div class="pm-label">players selected</div>
        <button class="pm-btn" onclick="changeCount(1)">+</button>
      </div>
    </div>
    <button class="rm-go-btn" onclick="pickRandom(null)">🎯 Pick a random game!</button>
    <span class="rm-close-link" onclick="closeRandomModal()">Cancel</span>`;
}

function changeCount(delta) {
  randomOwners.clear();
  document.querySelectorAll('.roc').forEach(c => c.classList.remove('active'));
  randomPlayers = Math.max(0, randomPlayers + delta);
  document.getElementById('pm-display').textContent = randomPlayers;
}

function closeRandomModal() { document.getElementById('random-overlay').classList.remove('show'); }

function pickRandom(excludeId) {
  const playerCount = randomOwners.size > 0 ? randomOwners.size : randomPlayers;

  let pool = allGames.filter(g => {
    const mx = parseInt(g['Max']) || 999;
    if (playerCount > 0 && playerCount > mx) return false;
    if (randomOwners.size > 0) {
      const ow = g['Owned by'].split(',').map(o=>o.trim());
      if (!ow.some(o => randomOwners.has(o))) return false;
    }
    return true;
  });

  if (excludeId) pool = pool.filter(g => g['ID'] !== excludeId);

  if (!pool.length) {
    document.getElementById('random-inner').innerHTML = `
      <h2>😔 No other game found</h2>
      <p class="sub">No other game matches your conditions. Try adjusting the player count or owners.</p>
      <button class="rm-go-btn" onclick="openRandom()">← Try again</button>
      <span class="rm-close-link" onclick="closeRandomModal()">Close</span>`;
    return;
  }

  // Weighted random: best rank (lowest number) = highest weight
  // Score = 1 / rank (so rank 1 → 1.0, rank 1000 → 0.001)
  // We normalize so rank 1 = 10x chance vs rank 1000 linearly
  const maxRank = Math.max(...pool.map(g => { const r=parseInt(g['BGG Rank'])||99999; return r>=99999?0:r; }));
  pool.forEach(g => {
    const r = parseInt(g['BGG Rank'])||99999;
    g._weight = r >= 99999 ? 0.1 : (maxRank - r + 1) / maxRank * 9 + 1; // 1 to 10 scale
  });
  const totalW = pool.reduce((s,g) => s + g._weight, 0);
  let rand = Math.random() * totalW;
  let chosen = pool[pool.length-1];
  for (const g of pool) { rand -= g._weight; if (rand <= 0) { chosen = g; break; } }

  lastRandomId = chosen['ID'];
  showRandomResult(chosen, playerCount, excludeId != null);
}

async function showRandomResult(g, playerCount, isReshuffle) {
  document.getElementById('random-inner').innerHTML = `
    <h2>${isReshuffle ? '🔀 Reshuffled!' : '🎯 Tonight you play...'}</h2>
    <p class="sub">${playerCount > 0 ? 'For '+playerCount+' player'+(playerCount>1?'s':'') : 'Any number of players'}</p>
    <div class="result-card" id="res-card">
      <div class="result-card-name">${g['Game']}</div>
      <div class="result-card-year">${g['Year']||''} · BGG Rank: ${parseInt(g['BGG Rank'])>=99999?'Unranked':'#'+parseInt(g['BGG Rank']).toLocaleString()}</div>
      <div class="result-card-stats">
        <div class="rc-stat">⏱ <strong>${g['Playtime']||'?'} min</strong></div>
        <div class="rc-stat">👥 <strong>${g['Min']}–${g['Max']} players</strong></div>
        <div class="rc-stat">⚙ <strong class="${weightClass(g['Weight'])}">${parseFloat(g['Weight']||0).toFixed(2)}</strong></div>
        <div class="rc-stat">⭐ <strong>${g['BGG Rating']||'—'}</strong></div>
      </div>
      <div class="rc-stat" style="margin-bottom:10px">In collection: <strong>${g['Owned by']||'—'}</strong></div>
    </div>
    <div class="rm-actions">
      <button class="rm-action-btn" onclick="openRandom()">← Back</button>
      <button class="rm-action-btn primary" onclick="pickRandom('${g['ID']}')">🔀 Reshuffle</button>
    </div>
    <div style="margin-top:10px;text-align:center"><a class="bgg-btn" href="https://boardgamegeek.com/boardgame/${g['ID']}" target="_blank">View on BGG ↗</a></div>`;

  // Try loading thumbnail
  try {
    const res = await fetch(`https://boardgamegeek.com/xmlapi2/thing?id=${g['ID']}`);
    const xml = new DOMParser().parseFromString(await res.text(), 'text/xml');
    const thumb = xml.querySelector('thumbnail');
    if (thumb && thumb.textContent && document.getElementById('res-card')) {
      const img = document.createElement('img');
      img.className = 'result-img';
      img.src = thumb.textContent.trim();
      img.onerror = () => img.remove();
      const card = document.getElementById('res-card');
      card.insertBefore(img, card.querySelector('.result-card-stats'));
    }
  } catch(e) {}
}

// ── INIT ─────────────────────────────────────────────────────────────────────
loadGames();
</script>
</body>
</html>
